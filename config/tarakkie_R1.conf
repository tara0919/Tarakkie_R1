# Increase Bluetooth transmission power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable deep sleep support
CONFIG_ZMK_SLEEP=y

# Milliseconds of inactivity before entering deep sleep (30 minutes)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Enable battery reporting and sensors
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_SENSOR=y

# NFCピンをGPIOとして使用
CONFIG_NFCT_PINS_AS_GPIOS=y

# RGB LED Indicator Widget
CONFIG_RGBLED_WIDGET=y

# Battery indicator colors
# HIGH(>=80%)=GREEN, MEDIUM(20-80%)=YELLOW, LOW(<20%)=RED, CRITICAL(<10%)=RED
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=80
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_HIGH=2
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_MEDIUM=3
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_LOW=1
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_CRITICAL=1

# BLE connection colors
# Connected=BLUE, Advertising=BLUE, Disconnected=RED
CONFIG_RGBLED_WIDGET_CONN_COLOR_CONNECTED=4
CONFIG_RGBLED_WIDGET_CONN_COLOR_ADVERTISING=4
CONFIG_RGBLED_WIDGET_CONN_COLOR_DISCONNECTED=1

# Layer colors (constant color while layer is active)
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=0
